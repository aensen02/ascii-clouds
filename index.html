	return oVal += (iVal - oVal) * eVal;
}

function draw() {
  background(bgColorPicker.value());
  
  // act dont know what c does hehe
  //let c = color(0, 204, 0);
  fill(colorPicker.value());

  let g = amount.value();
  let n = sliderNoise.value();
  let myX = waveX.value()/100;
  let myY = waveY.value()/100;
  let cs = cellSize.value();
  
  //print(width*height/cellSize)
  txt = []
  for (let y = 0; y < height; y += cs) {
	txtLine = ""
    for (let x = 0; x < width; x += cs) {

      // base wave pattern
      let wave =
        sin(x * myX + t) +
        sin(y * myY + t * 1.4) +
        noise(x * 0.01, y * 0.01, t * 0.3) * n;

      // convert wave to grayscale 0..255 > stores the brightness level of the wave pattern
      let gray = map(wave, -2, 4, 0, 255);

      /* map grayscale to ascii character 
      > If gray is near 0, the result is near the start of the ramp; 
      if it is near g, the result is near the end of the ramp */
      let index = floor(map(gray, 0, g, 0, asciiRamp.length));
      let density = asciiRamp.charAt(index);

    	// if below certain cellSize, can use dynamic fontsize
    	//textSize(round(constrain(gray/2, 1, 20))); // ascii verändert größe
    	//textSize(10)
    	text(density, x, y);
    	if(density == ""){
    		density = " "
    	}
		txtLine += density
    }
    txt.push(txtLine)
  }
  
let sp = speed.value()/100;
  t += sp;

	textSize(cellSize.value());
}

// Function that saves the canvas as a png
function saveAsciiImg() {
	saveCanvas("ascii-clouds", "png");
}

function saveAsciiGif() {
	saveGif("ascii-clouds", 60, {
    units: "frames",
    delay: 0
  });
}

function saveAsciiTxt() {
	saveStrings(txt, "ascii-clouds.txt")
}

//function to get random numbers for the sliders
function changeSettings(){
	amount.value(random(50, 255));
	speed.value(random(1, 15));
	sliderNoise.value(random(0, 10));
	waveX.value(random(1, 30));
	waveY.value(random(1, 30));
	cellSize.value(random(10, 40));
}

function aboutToggle(){
		if( myAbout.style('display') == 'none'){
			myAbout.show()
		} else{
			myAbout.hide()
		}
}
